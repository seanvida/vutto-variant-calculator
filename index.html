<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bike Variant Finder</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --line-2: #353b48;
    --text: #eef1f6;
    --text-2: #aab2c0;
    --text-3: #7c8493;
    --accent: #3ea6ff;
    --accent-2: #1f7fd6;
    --good: #2fd07a;
    --good-bg: #143324;
    --warn: #ffb33e;
    --warn-bg: #33270e;
    --r: 14px;
    --r-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1b2230 0%, var(--bg) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 32px 18px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  header.app { text-align: center; margin-bottom: 26px; }
  header.app .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: -0.02em; font-size: 14px;
    color: var(--text-2); text-transform: uppercase;
  }
  header.app .logo .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
  header.app h1 { font-size: 28px; letter-spacing: -0.03em; margin: 10px 0 6px; }
  header.app p { color: var(--text-3); font-size: 14.5px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }

  /* breadcrumb */
  .crumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .crumb {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 12px; font-size: 12.5px; color: var(--text-2);
    cursor: pointer; transition: .15s;
  }
  .crumb:hover { border-color: var(--accent); color: var(--text); }
  .crumb .k { color: var(--text-3); }
  .crumb .v { color: var(--text); font-weight: 600; }
  .crumb .x { color: var(--text-3); font-weight: 700; margin-left: 2px; }
  .crumbs .hint { color: var(--text-3); font-size: 12px; align-self: center; }

  .step-label { font-size: 12.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .step-q { font-size: 20px; letter-spacing: -0.02em; margin-bottom: 4px; }
  .step-hint { color: var(--text-3); font-size: 13.5px; margin-bottom: 18px; }

  .opts { display: grid; gap: 10px; }
  .opts.cols-2 { grid-template-columns: 1fr 1fr; }
  @media (max-width: 520px) { .opts.cols-2 { grid-template-columns: 1fr; } }

  .opt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line-2);
    border-radius: var(--r-sm);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: .14s;
    width: 100%;
  }
  .opt:hover { border-color: var(--accent); background: #20262f; transform: translateY(-1px); }
  .opt .arrow { color: var(--text-3); font-size: 18px; }
  .opt:hover .arrow { color: var(--accent); }
  .opt .sub { display: block; font-size: 12px; color: var(--text-3); font-weight: 400; margin-top: 2px; }

  .brand-group { margin-bottom: 16px; }
  .brand-group:last-child { margin-bottom: 0; }
  .brand-group h3 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 9px; }

  /* result */
  .result-badge { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 6px 12px; border-radius: 999px; margin-bottom: 14px; }
  .result-badge.ok { background: var(--good-bg); color: var(--good); }
  .result-badge.warn { background: var(--warn-bg); color: var(--warn); }
  .result-name { font-size: 30px; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 6px; }
  .result-sub { color: var(--text-2); font-size: 15px; margin-bottom: 20px; }

  .specs { border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; }
  .specs .row { display: flex; justify-content: space-between; gap: 16px; padding: 11px 15px; font-size: 14px; border-bottom: 1px solid var(--line); }
  .specs .row:last-child { border-bottom: none; }
  .specs .row:nth-child(odd) { background: rgba(255,255,255,.015); }
  .specs .row .k { color: var(--text-3); }
  .specs .row .v { color: var(--text); font-weight: 600; text-align: right; }

  .candidates { display: grid; gap: 10px; margin-top: 4px; }

  .section-title { font-size: 13px; color: var(--text-2); font-weight: 600; margin: 22px 0 10px; }

  .row-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
  .btn { border: 1px solid var(--line-2); background: var(--panel-2); color: var(--text); border-radius: var(--r-sm); padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .14s; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #04121f; }
  .btn.primary:hover { background: #57b3ff; }

  details.override { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 16px; }
  details.override summary { cursor: pointer; color: var(--text-2); font-size: 13.5px; font-weight: 600; list-style: none; }
  details.override summary::-webkit-details-marker { display: none; }
  details.override summary:hover { color: var(--accent); }
  details.override summary::before { content: "▸ "; color: var(--text-3); }
  details.override[open] summary::before { content: "▾ "; }
  details.override .candidates { margin-top: 14px; }

  footer.app { text-align: center; color: var(--text-3); font-size: 12px; margin-top: 28px; }
  footer.app code { background: var(--panel-2); padding: 2px 6px; border-radius: 5px; border: 1px solid var(--line); }
</style>
</head>
<body>

const BRAND_ORDER = ["Royal Enfield", "TVS", "Bajaj", "Honda"];

/* ============================= ENGINE / STATE ============================ */
const state = { modelKey: null, genIndex: null, answers: [], override: null };
const app = document.getElementById("app");

function splitVals(raw) {
  if (!raw) return [];
  return raw.split(",").map(s => s.trim()).filter(Boolean);
}
// A variant matches a chosen value if its spec value (split on commas) contains it.
// Blank spec value = wildcard (does not eliminate the variant).
function variantMatches(variant, key, value) {
  const raw = variant.specs[key];
  if (raw === undefined || raw === "") return true;
  return splitVals(raw).includes(value);
}
function currentGen() {
  const m = DATA[state.modelKey];
  if (!m) return null;
  return m.generations[state.genIndex];
}
function candidatesFor(gen, answers) {
  return gen.variants.filter(v => answers.every(a => variantMatches(v, a.key, a.value)));
}
// distinct, non-blank option values for a question across the given variants
function optionsFor(key, variants) {
  const seen = [];
  variants.forEach(v => splitVals(v.specs[key]).forEach(val => { if (!seen.includes(val)) seen.push(val); }));
  return seen;
}
// next question with real discriminating power (>=2 distinct values among candidates)
function nextQuestion(gen, answers, candidates) {
  const asked = new Set(answers.map(a => a.key));
  for (const key of gen.questions) {
    if (asked.has(key)) continue;
    if (optionsFor(key, candidates).length >= 2) return key;
  }
  return null;
}

/* ================================ RENDER ================================ */
function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function render() {
  app.innerHTML = "";
  if (!state.modelKey) return renderModelPicker();
  const m = DATA[state.modelKey];
  if (state.genIndex === null) {
    if (m.generations.length === 1) { state.genIndex = 0; } // auto-skip year step
    else return renderYearPicker();
  }
  return renderQuestionOrResult();
}

function renderCrumbs() {
  const wrap = el('<div class="crumbs"></div>');
  if (state.modelKey) {
    const m = DATA[state.modelKey];
    wrap.appendChild(makeCrumb("Model", m.make + " " + m.model, () => { state.modelKey = null; state.genIndex = null; state.answers = []; state.override = null; render(); }));
    if (state.genIndex !== null && m.generations.length > 1) {
      wrap.appendChild(makeCrumb("Year", m.generations[state.genIndex].yearLabel, () => { state.genIndex = null; state.answers = []; state.override = null; render(); }));
    }
    state.answers.forEach((a, i) => {
      wrap.appendChild(makeCrumb(QMETA[a.key].label, a.value, () => { state.answers = state.answers.slice(0, i); state.override = null; render(); }));
    });
  }
  if (wrap.children.length === 0) wrap.appendChild(el('<span class="hint">Start by choosing a model below.</span>'));
  return wrap;
}
function makeCrumb(k, v, onClick) {
  const c = el(`<button class="crumb"><span class="k">${esc(k)}:</span> <span class="v">${esc(v)}</span> <span class="x">✕</span></button>`);
  c.addEventListener("click", onClick);
  return c;
}

function renderModelPicker() {
  app.appendChild(renderCrumbs());
  app.appendChild(el('<div class="step-label">Step 1</div>'));
  app.appendChild(el('<div class="step-q">Select the bike model</div>'));
  app.appendChild(el('<div class="step-hint">Choose the make &amp; model you want to identify.</div>'));

  BRAND_ORDER.forEach(brand => {
    const models = Object.entries(DATA).filter(([, m]) => m.make === brand);
    if (!models.length) return;
    const group = el(`<div class="brand-group"><h3>${esc(brand)}</h3></div>`);
    const opts = el('<div class="opts cols-2"></div>');
    models.forEach(([key, m]) => {
      const b = el(`<button class="opt">${esc(m.model)}<span class="arrow">›</span></button>`);
      b.addEventListener("click", () => { state.modelKey = key; state.genIndex = null; state.answers = []; state.override = null; render(); });
      opts.appendChild(b);
    });
    group.appendChild(opts);
    app.appendChild(group);
  });
}

function renderYearPicker() {
  app.appendChild(renderCrumbs());
  const m = DATA[state.modelKey];
  app.appendChild(el('<div class="step-label">Step 2</div>'));
  app.appendChild(el('<div class="step-q">Which model year / generation?</div>'));
  app.appendChild(el('<div class="step-hint">The right questions depend on when the bike was made.</div>'));
  const opts = el('<div class="opts"></div>');
  m.generations.forEach((g, i) => {
    const b = el(`<button class="opt">${esc(g.yearLabel)}<span class="arrow">›</span></button>`);
    b.addEventListener("click", () => { state.genIndex = i; state.answers = []; state.override = null; render(); });
    opts.appendChild(b);
  });
  app.appendChild(opts);
}

function renderQuestionOrResult() {
  app.appendChild(renderCrumbs());
  const gen = currentGen();
  const candidates = candidatesFor(gen, state.answers);

  // Resolved (or user override) -> result
  if (state.override || candidates.length <= 1) return renderResult(gen, candidates);

  const key = nextQuestion(gen, state.answers, candidates);
  if (!key) return renderResult(gen, candidates); // no more discriminating questions

  const stepNo = (DATA[state.modelKey].generations.length > 1 ? 3 : 2) + state.answers.length;
  app.appendChild(el(`<div class="step-label">Step ${stepNo}</div>`));
  app.appendChild(el(`<div class="step-q">${esc(QMETA[key].label)}</div>`));
  app.appendChild(el(`<div class="step-hint">${esc(QMETA[key].hint)}</div>`));

  const values = optionsFor(key, candidates);
  const opts = el(`<div class="opts ${values.length > 3 ? "" : "cols-2"}"></div>`);
  values.forEach(val => {
    const remain = candidates.filter(v => variantMatches(v, key, val)).length;
    const sub = remain === 1 ? '<span class="sub">→ identifies the variant</span>' : `<span class="sub">${remain} variants match</span>`;
    const b = el(`<button class="opt"><span>${esc(val)}${sub}</span><span class="arrow">›</span></button>`);
    b.addEventListener("click", () => { state.answers.push({ key, value: val }); render(); });
    opts.appendChild(b);
  });
  app.appendChild(opts);
}

function renderResult(gen, candidates) {
  const m = DATA[state.modelKey];
  let chosen = state.override || (candidates.length === 1 ? candidates[0] : null);

  if (chosen) {
    app.appendChild(el(`<div class="result-badge ok">✓ ${state.override ? "Manually selected" : "Variant identified"}</div>`));
    app.appendChild(el(`<div class="result-name">${esc(chosen.name)}</div>`));
    app.appendChild(el(`<div class="result-sub">${esc(m.make)} ${esc(m.model)} · ${esc(gen.yearLabel)}</div>`));
    app.appendChild(renderSpecs(gen, chosen));
  } else {
    // ambiguous — present the remaining candidates to finalise
    app.appendChild(el('<div class="result-badge warn">! Almost there</div>'));
    app.appendChild(el(`<div class="result-name">${candidates.length} possible variants</div>`));
    app.appendChild(el(`<div class="result-sub">These share the same recorded specs. Pick the exact one:</div>`));
    const opts = el('<div class="candidates"></div>');
    candidates.forEach(v => {
      const b = el(`<button class="opt"><span>${esc(v.name)}${v.specs["Colour"] ? `<span class="sub">${esc(v.specs["Colour"])}</span>` : ""}</span><span class="arrow">›</span></button>`);
      b.addEventListener("click", () => { state.override = v; render(); });
      opts.appendChild(b);
    });
    app.appendChild(opts);
  }

  // Override / manual choose-from-all
  const others = gen.variants.filter(v => !chosen || v.name !== chosen.name);
  if (others.length) {
    const det = el('<details class="override"><summary>Not right? Choose a different variant</summary></details>');
    const opts = el('<div class="candidates"></div>');
    gen.variants.forEach(v => {
      const b = el(`<button class="opt"><span>${esc(v.name)}</span><span class="arrow">›</span></button>`);
      b.addEventListener("click", () => { state.override = v; render(); });
      opts.appendChild(b);
    });
    det.appendChild(opts);
    app.appendChild(det);
  }

  const btns = el('<div class="row-btns"></div>');
  const restart = el('<button class="btn primary">Identify another bike</button>');
  restart.addEventListener("click", () => { state.modelKey = null; state.genIndex = null; state.answers = []; state.override = null; render(); });
  btns.appendChild(restart);
  if (state.override) {
    const back = el('<button class="btn">Back to questions</button>');
    back.addEventListener("click", () => { state.override = null; render(); });
    btns.appendChild(back);
  }
  app.appendChild(btns);
}

function renderSpecs(gen, variant) {
  const box = el('<div><div class="section-title">Distinguishing features</div></div>');
  const specs = el('<div class="specs"></div>');
  gen.questions.forEach(key => {
    let val = variant.specs[key];
    if (val === undefined || val === "") val = "—";
    specs.appendChild(el(`<div class="row"><span class="k">${esc(QMETA[key].label)}</span><span class="v">${esc(val)}</span></div>`));
  });
  box.appendChild(specs);
  return box;
}

render();
</script>
</body>
</html>
